name: Sync resume to README

on:
  push:
    branches: [main]
    paths: [assets/arturo-builds-infra-resume.md]

jobs:
  sync-resume:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject resume into README
        run: |
          python3 - <<'EOF'
          import re

          with open('assets/arturo-builds-infra-resume.md', 'r') as f:
              lines = f.read().splitlines()

          # Strip header block (name, contact) before first **PROFESSIONAL section
          start = next(
              (i for i, l in enumerate(lines) if l.startswith('**PROFESSIONAL')),
              0
          )
          resume = '\n'.join(lines[start:]).strip()

          with open('README.md', 'r') as f:
              readme = f.read()

          pattern = r'<!-- RESUME_START -->.*?<!-- RESUME_END -->'
          replacement = f'<!-- RESUME_START -->\n{resume}\n<!-- RESUME_END -->'
          updated = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open('README.md', 'w') as f:
              f.write(updated)
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: sync resume from RESUME.md"
          git push
